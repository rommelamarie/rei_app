<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>REI | Neural Link</title>
    
    <meta name="theme-color" content="#0a0101">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="REI">
    
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/icon-192.png">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
          --safe-top: env(safe-area-inset-top);
          --safe-bottom: env(safe-area-inset-bottom);
        }
        body {
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            overflow: hidden;
            background-color: #050000;
            overscroll-behavior-y: contain;
            height: 100dvh;
            color: #fee2e2;
        }
        #root {
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }
        .mobile-safe-top { padding-top: var(--safe-top); }
        .mobile-safe-bottom { padding-bottom: var(--safe-bottom); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #450a0a; border-radius: 10px; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #450a0a; border-radius: 10px; }

        .scanlines::after {
          content: "";
          position: absolute;
          inset: 0;
          background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.25) 50%),
                      linear-gradient(90deg, rgba(255,0,0,0.06), rgba(0,255,0,0.02), rgba(0,0,255,0.06));
          background-size: 100% 2px, 3px 100%;
          pointer-events: none;
          z-index: 1000;
        }

        @keyframes neural-glow {
          0%, 100% { opacity: 0.4; transform: scale(1) rotate(0deg); filter: drop-shadow(0 0 10px rgba(220,38,38,0.2)); }
          50% { opacity: 1; transform: scale(1.1) rotate(3deg); filter: drop-shadow(0 0 30px rgba(220,38,38,0.6)); }
        }
        @keyframes slow-spin {
          from { transform: rotate(0deg); }
          to { transform: rotate(360deg); }
        }
        .animate-neural-glow { animation: neural-glow 6s ease-in-out infinite; }
        .animate-slow-spin { animation: slow-spin 120s linear infinite; }
    </style>
</head>
<body class="scanlines">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
